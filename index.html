<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Nexus Notes - Cloud Edition</title>
    <link rel="stylesheet" href="style.css" />
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
</head>
<body data-theme="light">

    <div id="cmdPalette" class="cmd-overlay hidden">
        <div class="cmd-box">
            <div class="cmd-header">
                <span class="cmd-icon">⌘</span>
                <input id="cmdInput" placeholder="搜尋指令或筆記..." autocomplete="off" />
                <kbd class="cmd-esc">ESC</kbd>
            </div>
            <div id="cmdResults" class="cmd-results">
                <div class="cmd-section-label">快速指令</div>
                <div class="cmd-item" data-action="new"><span class="cmd-item-icon">📝</span> 新增筆記 <kbd>N</kbd></div>
                <div class="cmd-item" data-action="auth"><span class="cmd-item-icon">☁️</span> Google 雲端登入 <kbd>L</kbd></div>
                <div class="cmd-item" data-action="theme"><span class="cmd-item-icon">🌙</span> 切換深色/淺色 <kbd>T</kbd></div>
                <div class="cmd-item" data-action="search"><span class="cmd-item-icon">🔍</span> 全域搜尋 <kbd>/</kbd></div>
            </div>
        </div>
    </div>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="app-header">
                <h2>Nexus Notes</h2>
                <button id="btnAuth" class="btn-sidebar-action">登入 Google</button>
            </div>
            
            <div class="sidebar-section">
                <h3>工作區 <span id="syncStatus" class="status-dot"></span></h3>
                <ul id="noteTree" class="note-tree">
                    </ul>
                <button id="btnNewNote" class="btn-sidebar-action btn-new">+ 新增筆記</button>
            </div>
            
            <div class="sidebar-section">
                <h3>標籤 (Tags)</h3>
                <div id="tagsBar" class="tags-bar"></div>
            </div>
        </aside>

        <main class="editor-area">
            <div class="note-header">
                <input type="text" id="noteTitle" class="note-title" placeholder="無標題筆記..." disabled />
                <div class="note-header-actions">
                    <button id="btnMobileMenu" class="icon-btn mobile-only">☰</button>
                </div>
            </div>
            
            <div id="blocksContainer" class="blocks-container">
                <div class="empty-state">請選擇或建立一則筆記</div>
            </div>
        </main>

        <aside class="right-panel">
            <div class="sidebar-section">
                <h3>筆記資訊</h3>
                <div class="note-stats">
                    <div class="prop-row">
                        <span class="prop-key">字數</span>
                        <span id="propWords" class="prop-val">—</span>
                    </div>
                    <div class="prop-row">
                        <span class="prop-key">區塊數</span>
                        <span id="propBlocks" class="prop-val">—</span>
                    </div>
                    <div class="prop-row">
                        <span class="prop-key">連結數</span>
                        <span id="propLinks" class="prop-val">—</span>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <div id="mobileDrawer" class="mobile-drawer hidden">
        <div id="drawerMask" class="drawer-mask"></div>
        <div class="drawer-panel">
            <div class="drawer-header">
                <span class="drawer-title">筆記目錄</span>
                <button id="closeDrawer" class="icon-btn">✕</button>
            </div>
            <div class="drawer-actions" id="drawerActions">
                <button id="btnNewNoteMobile" class="btn-sidebar-action btn-new" style="width:100%">+ 新增筆記</button>
                <button id="btnAuthMobile" class="btn-sidebar-action" style="width:100%; margin-top:8px;">登入 Google</button>
            </div>
            <ul id="noteTreeMobile" class="note-tree"></ul>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>
