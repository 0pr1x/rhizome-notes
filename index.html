<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Cloud Notes</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body data-theme="light">
  <header class="topbar">
    <div class="brand">
      <div class="logo">N</div>
      <div>
        <div class="title">Cloud Notes</div>
        <div class="sub">GitHub Frontend + Google Drive API</div>
      </div>
    </div>
    <div class="top-actions">
      <button id="btnLogin" class="btn primary">Google 登入</button>
      <button id="btnLoad" class="btn">載入雲端</button>
      <button id="btnSave" class="btn primary">儲存</button>
      <button id="btnNew" class="btn">新增筆記</button>
      <button id="btnTheme" class="btn">主題</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="panel">
        <div class="panel-title">工作區</div>
        <div id="status" class="status">尚未登入</div>
      </div>

      <div class="panel">
        <div class="panel-title">筆記列表</div>
        <input id="search" class="search" placeholder="搜尋標題/內容..." />
        <div id="noteList" class="note-list"></div>
      </div>

      <div class="panel">
        <div class="panel-title">同步模式</div>
        <div class="hint">電腦/平板：可編輯 + 儲存<br>手機：read only + 搜尋</div>
      </div>
    </aside>

    <section class="editor-wrap">
      <div class="editor-head">
        <input id="noteTitle" class="note-title" placeholder="筆記標題" />
        <div class="meta">
          <span id="saveState">未儲存</span>
          <span id="wordCount">0 字</span>
        </div>
      </div>

      <div class="toolbar">
        <button class="tool" data-cmd="bold"><b>B</b></button>
        <button class="tool" data-cmd="italic"><i>I</i></button>
        <button class="tool" data-cmd="underline"><u>U</u></button>
        <button class="tool" data-cmd="h1">H1</button>
        <button class="tool" data-cmd="h2">H2</button>
        <button class="tool" data-cmd="h3">H3</button>
        <button class="tool" data-cmd="quote">❝</button>
        <button class="tool" data-cmd="code">&lt;/&gt;</button>
        <button class="tool" data-cmd="link">鏈結</button>
        <button class="tool" data-cmd="img">圖片</button>
        <button class="tool" data-cmd="todo">待辦</button>
        <button class="tool" data-cmd="hr">—</button>
        <button class="tool" data-cmd="save">💾</button>
      </div>

      <div id="editor" class="editor" contenteditable="true"></div>

      <div class="footer-note">
        圖片請用 <code>~/image/檔名</code>，例如 <code>~/image/a.png</code>
      </div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
