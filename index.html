<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rhizome Notes</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<script src="config.js"></script>
<script src="drive.js"></script>
</head>

<body>

<header class="header">
  <button id="menuBtn">☰</button>
  <h3>Rhizome Notes</h3>
  <button id="syncBtn">☁</button>
</header>

<div class="app">

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <button id="newNote">＋ New</button>
    <ul id="noteList"></ul>
  </aside>

  <!-- Editor -->
  <main>
    <div id="editor"></div>
  </main>

  <!-- Right Panel -->
  <aside id="rightPanel" class="right">
    <h4>Tags</h4>
    <div id="tags"></div>

    <h4>Backlinks</h4>
    <div id="backlinks"></div>
  </aside>

</div>
<script src="app.js"></script>
</body>
</html>
